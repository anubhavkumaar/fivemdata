<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiveM Server Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#151e2e',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* Toast Animation */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        .toast-leave { animation: fadeOut 0.3s ease-in forwards; }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 font-sans antialiased min-h-screen flex flex-col">

    <!-- Navbar/Header -->
    <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-blue-500 to-blue-700 text-white p-2 rounded-lg shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-truck-fast text-xl"></i>
                </div>
                <h1 class="text-xl font-bold text-white tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">FiveM Dashboard</h1>
            </div>
            <div class="flex items-center gap-3">
                <div id="connectionStatus" class="flex items-center gap-2 text-sm font-medium text-emerald-400 bg-emerald-400/10 px-3 py-1.5 rounded-full">
                    <i class="fa-solid fa-circle-dot animate-pulse text-[10px]"></i> Live
                </div>
                <a id="headerConnectBtn" href="#" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-full text-sm font-bold shadow-lg shadow-blue-500/20 transition-all transform hover:scale-105">
                    <i class="fa-solid fa-play text-xs"></i> <span class="hidden sm:inline">Connect</span>
                </a>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex flex-col gap-6">
        
        <!-- Server Info Skeleton / Container -->
        <section id="serverInfo" class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl flex items-center justify-center text-slate-500 animate-pulse h-32 col-span-1 md:col-span-3">
                Loading server status...
            </div>
        </section>

        <!-- Controls Section -->
        <section class="bg-slate-900 border border-slate-800 p-5 rounded-2xl shadow-sm flex flex-col xl:flex-row gap-4 items-start xl:items-center justify-between">
            
            <!-- Search & Sort -->
            <div class="flex flex-col sm:flex-row gap-3 w-full xl:w-auto">
                <div class="relative w-full sm:w-64">
                    <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                    <input type="text" id="searchInput" placeholder="Search players..." oninput="renderPlayers()" 
                           class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-xl pl-10 pr-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                </div>
                <div class="relative w-full sm:w-48">
                    <i class="fa-solid fa-sort absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                    <select onchange="setSortOrder(this.value)" 
                            class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-xl pl-10 pr-8 py-2.5 appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all cursor-pointer">
                        <option value="nameAsc">Name (A-Z)</option>
                        <option value="nameDesc">Name (Z-A)</option>
                        <option value="idAsc">Server ID (Asc)</option>
                        <option value="idDesc">Server ID (Desc)</option>
                    </select>
                    <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 transform -translate-y-1/2 text-slate-500 text-xs pointer-events-none"></i>
                </div>
            </div>

            <!-- Alerts Control -->
            <div class="flex flex-col sm:flex-row gap-3 w-full xl:w-auto items-start sm:items-center">
                <div class="flex items-center gap-2 w-full sm:w-auto">
                    <div class="relative flex-grow sm:w-48">
                        <i class="fa-solid fa-bell absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                        <input type="text" id="alertNameInput" placeholder="Add alert name..." 
                               class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-xl pl-10 pr-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent transition-all">
                    </div>
                    <button onclick="addAlertName()" class="bg-rose-500 hover:bg-rose-600 text-white px-4 py-2.5 rounded-xl font-medium transition-colors shadow-lg shadow-rose-500/20 whitespace-nowrap">
                        <i class="fa-solid fa-plus mr-1"></i> Add
                    </button>
                </div>
            </div>
        </section>

        <!-- Active Alerts Display -->
        <section id="alertListContainer" class="hidden flex-wrap gap-2 items-center">
            <span class="text-sm font-medium text-slate-500 mr-2"><i class="fa-solid fa-tower-broadcast mr-1"></i> Active Alerts:</span>
            <div id="alertList" class="flex flex-wrap gap-2"></div>
        </section>

        <!-- Error Message Container -->
        <div id="error" class="hidden bg-rose-500/10 border border-rose-500/20 text-rose-400 p-4 rounded-xl text-center font-medium"></div>

        <!-- Players Grid -->
        <section id="playerList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 pb-10">
            <!-- Player cards inject here -->
        </section>

    </main>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

    <script>
        const joinUrl = "https://cfx.re/join/5m43x6";
        let players = [];
        let sortOrder = 'nameAsc';
        let alertNames = JSON.parse(localStorage.getItem('alertNames') || '[]');
        let firstLoad = true;

        // Custom Toast Notification System
        function showToast(title, message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            let icon = 'fa-info-circle text-blue-400';
            let bgStyle = 'bg-slate-800 border-l-4 border-blue-500';
            
            if (type === 'alert') {
                icon = 'fa-triangle-exclamation text-rose-400';
                bgStyle = 'bg-slate-800 border-l-4 border-rose-500';
            } else if (type === 'success') {
                icon = 'fa-check-circle text-emerald-400';
                bgStyle = 'bg-slate-800 border-l-4 border-emerald-500';
            }

            toast.className = `toast-enter pointer-events-auto ${bgStyle} text-slate-200 p-4 rounded shadow-2xl flex items-start gap-3 w-full`;
            toast.innerHTML = `
                <i class="fa-solid ${icon} mt-0.5 text-lg"></i>
                <div class="flex-grow">
                    <h4 class="font-bold text-sm text-white">${title}</h4>
                    <p class="text-xs text-slate-400 mt-1">${message}</p>
                </div>
                <button onclick="this.parentElement.remove()" class="text-slate-500 hover:text-white transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            `;

            container.appendChild(toast);

            // Auto remove after 5 seconds
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.classList.replace('toast-enter', 'toast-leave');
                    setTimeout(() => toast.remove(), 300); // Wait for animation
                }
            }, 5000);
        }

        // Utility: Clean color codes from FiveM names
        function cleanServerName(name) {
            if (!name) return "Unknown";
            return name.replace(/\^[0-9]/g, '');
        }

        function saveAlerts() {
            localStorage.setItem('alertNames', JSON.stringify(alertNames));
            renderAlertList();
        }

        function addAlertName() {
            const input = document.getElementById('alertNameInput');
            const name = input.value.trim();
            if (name && !alertNames.includes(name.toLowerCase())) {
                alertNames.push(name.toLowerCase());
                saveAlerts();
                showToast('Alert Added', `You will be notified when "${name}" joins.`, 'success');
            }
            input.value = '';
        }

        // Global so inline onclick works
        window.removeAlertName = function(name) {
            alertNames = alertNames.filter(n => n !== name);
            saveAlerts();
        }

        function renderAlertList() {
            const alertListDiv = document.getElementById('alertList');
            const container = document.getElementById('alertListContainer');
            
            if (alertNames.length === 0) {
                container.classList.add('hidden');
                container.classList.remove('flex');
                alertListDiv.innerHTML = "";
                return;
            }
            
            container.classList.remove('hidden');
            container.classList.add('flex');
            
            alertListDiv.innerHTML = alertNames.map(name => `
                <span class="bg-rose-500/10 text-rose-400 border border-rose-500/20 pl-3 pr-1 py-1 rounded-full text-xs font-medium flex items-center gap-2 group">
                    ${name}
                    <button class="bg-rose-500/20 hover:bg-rose-500 hover:text-white text-rose-400 w-5 h-5 rounded-full flex items-center justify-center transition-colors" onclick="removeAlertName('${name}')" title="Remove Alert">
                        <i class="fa-solid fa-xmark text-[10px]"></i>
                    </button>
                </span>
            `).join('');
        }

        async function fetchServerData() {
            const errorDiv = document.getElementById('error');
            const statusDiv = document.getElementById('connectionStatus');
            
            // Set Connect Button URL dynamically based on your joinUrl variable
            document.getElementById('headerConnectBtn').href = joinUrl;

            try {
                const serverCode = joinUrl.split("/").pop();
                const response = await fetch(`https://servers-frontend.fivem.net/api/servers/single/${serverCode}`);
                
                if (!response.ok) throw new Error("Invalid server code or server unreachable");

                const data = await response.json();
                const server = data.Data;

                // Render Server Info Cards
                document.getElementById('serverInfo').innerHTML = `
                    <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl flex items-center gap-4 shadow-sm hover:border-slate-700 transition-colors">
                        <div class="bg-blue-500/10 text-blue-500 w-12 h-12 rounded-xl flex items-center justify-center text-xl shrink-0">
                            <i class="fa-solid fa-server"></i>
                        </div>
                        <div class="min-w-0">
                            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-0.5">Server Hostname</p>
                            <h2 class="text-slate-100 font-bold truncate text-lg" title="${cleanServerName(server.hostname)}">${cleanServerName(server.hostname)}</h2>
                        </div>
                    </div>
                    
                    <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl flex items-center gap-4 shadow-sm hover:border-slate-700 transition-colors">
                        <div class="bg-purple-500/10 text-purple-400 w-12 h-12 rounded-xl flex items-center justify-center text-xl shrink-0">
                            <i class="fa-solid fa-globe"></i>
                        </div>
                        <div class="min-w-0">
                            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-0.5">IP Address</p>
                            <h2 class="text-slate-100 font-mono font-bold text-lg truncate" title="${server.connectEndPoints[0] || "N/A"}">${server.connectEndPoints[0] || "N/A"}</h2>
                        </div>
                    </div>

                    <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl flex items-center gap-4 shadow-sm hover:border-slate-700 transition-colors">
                        <div class="bg-emerald-500/10 text-emerald-400 w-12 h-12 rounded-xl flex items-center justify-center text-xl shrink-0">
                            <i class="fa-solid fa-users"></i>
                        </div>
                        <div class="w-full">
                            <div class="flex justify-between items-end mb-1">
                                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Players Online</p>
                                <span class="text-emerald-400 font-bold text-sm">${server.clients} <span class="text-slate-500 font-normal">/ ${server.sv_maxclients}</span></span>
                            </div>
                            <div class="w-full bg-slate-950 rounded-full h-2 mt-2 border border-slate-800">
                                <div class="bg-emerald-500 h-2 rounded-full" style="width: ${(server.clients / server.sv_maxclients) * 100}%"></div>
                            </div>
                        </div>
                    </div>
                `;

                // FiveM's public API strips identifiers. We need to fetch from the direct IP to get Discord/Steam/CFX IDs.
                let detailedPlayers = [];
                const ipAddress = server.connectEndPoints[0];
                let proxySuccess = false;
                
                if (ipAddress && !ipAddress.includes("fivem.net")) {
                    try {
                        // Use AbortController to prevent the proxy from hanging the dashboard indefinitely
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 4000); // 4 second timeout

                        // corsproxy.io is often more reliable for raw JSON fetches
                        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(`http://${ipAddress}/players.json`)}`;
                        
                        const playersResponse = await fetch(proxyUrl, { signal: controller.signal });
                        clearTimeout(timeoutId);

                        if (playersResponse.ok) {
                            // Fetch as text first to prevent JSON parse errors if a Cloudflare page is returned
                            const textData = await playersResponse.text();
                            try {
                                detailedPlayers = JSON.parse(textData);
                                proxySuccess = true;
                            } catch (parseError) {
                                console.warn("Server blocked proxy request (returned HTML/Non-JSON).");
                            }
                        }
                    } catch (e) {
                        console.warn("Proxy fetch failed or timed out. Falling back to public API.", e);
                    }
                }

                // If we got detailed players (with identifiers), use them. Otherwise, fall back to the public list.
                if (proxySuccess && detailedPlayers && detailedPlayers.length > 0) {
                    players = detailedPlayers;
                } else {
                    players = server.players || [];
                }

                // Check if we actually have identifiers in the final data
                const hasIdentifiers = players.some(p => p.identifiers && p.identifiers.length > 0);

                errorDiv.classList.add('hidden');
                
                if (hasIdentifiers) {
                    statusDiv.innerHTML = '<i class="fa-solid fa-circle-dot animate-pulse text-[10px]"></i> Live (Detailed)';
                    statusDiv.className = 'flex items-center gap-2 text-sm font-medium text-emerald-400 bg-emerald-400/10 px-3 py-1.5 rounded-full';
                } else {
                    statusDiv.innerHTML = '<i class="fa-solid fa-shield-halved text-[10px]"></i> Live (IDs Hidden)';
                    statusDiv.className = 'flex items-center gap-2 text-sm font-medium text-amber-400 bg-amber-400/10 px-3 py-1.5 rounded-full cursor-help';
                    statusDiv.title = "The server owner has hidden player identifiers, or blocked proxies.";
                    
                    if (firstLoad) {
                        showToast('Privacy Protected', 'This server hides Discord and Steam IDs. Showing basic info only.', 'alert');
                    }
                }
                
                renderPlayers();

            } catch (error) {
                console.error(error);
                statusDiv.innerHTML = '<i class="fa-solid fa-circle-xmark text-[10px]"></i> Offline';
                statusDiv.className = 'flex items-center gap-2 text-sm font-medium text-rose-400 bg-rose-400/10 px-3 py-1.5 rounded-full';
                
                errorDiv.innerText = "Error fetching server info. The server might be offline or restarting.";
                errorDiv.classList.remove('hidden');
            }
        }

        window.setSortOrder = function(order) {
            sortOrder = order;
            renderPlayers();
        }

        window.renderPlayers = function() {
            const playerListDiv = document.getElementById('playerList');
            const searchText = document.getElementById('searchInput').value.toLowerCase();

            let filteredPlayers = players.filter(player => player.name?.toLowerCase().includes(searchText));

            // Sorting logic
            if (sortOrder === 'nameAsc') {
                filteredPlayers.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
            } else if (sortOrder === 'nameDesc') {
                filteredPlayers.sort((a, b) => (b.name || "").localeCompare(a.name || ""));
            } else if (sortOrder === 'idAsc') {
                filteredPlayers.sort((a, b) => (a.id || 0) - (b.id || 0));
            } else if (sortOrder === 'idDesc') {
                filteredPlayers.sort((a, b) => (b.id || 0) - (a.id || 0));
            }

            // Alert Check Logic
            if (firstLoad) {
                let alertCount = 0;
                for (const player of filteredPlayers) {
                    const name = player.name || "";
                    if (alertNames.includes(name.toLowerCase())) {
                        setTimeout(() => {
                            showToast('Player Spotted!', `Target "${name}" is currently online.`, 'alert');
                        }, alertCount * 600); // Stagger toasts
                        alertCount++;
                    }
                }
                firstLoad = false;
            }

            if(filteredPlayers.length === 0) {
                playerListDiv.innerHTML = `
                    <div class="col-span-full py-12 text-center text-slate-500 border border-dashed border-slate-700 rounded-2xl">
                        <i class="fa-solid fa-users-slash text-4xl mb-3 opacity-50"></i>
                        <p>No players found matching your criteria.</p>
                    </div>
                `;
                return;
            }

            playerListDiv.innerHTML = filteredPlayers.map(player => {
                const name = cleanServerName(player.name || "Unknown");
                const serverId = player.id !== undefined ? player.id : "N/A";
                let discordId = "N/A";
                let steamId = "N/A";
                let cfxId = "N/A";

                if (player.identifiers && Array.isArray(player.identifiers)) {
                    const discordIdentifier = player.identifiers.find(id => id.startsWith("discord:"));
                    if (discordIdentifier) discordId = discordIdentifier.split(":")[1];
                    
                    const steamIdentifier = player.identifiers.find(id => id.startsWith("steam:"));
                    if (steamIdentifier) steamId = steamIdentifier.split(":")[1];
                    
                    const cfxIdentifier = player.identifiers.find(id => id.startsWith("fivem:"));
                    if (cfxIdentifier) cfxId = cfxIdentifier.split(":")[1];
                }

                const isAlerted = alertNames.includes(name.toLowerCase());
                const cardBorder = isAlerted ? 'border-rose-500/50 shadow-[0_0_15px_rgba(244,63,94,0.1)] bg-rose-950/10' : 'border-slate-800 hover:border-blue-500/50 hover:shadow-[0_0_15px_rgba(59,130,246,0.1)] hover:bg-slate-800/50';

                return `
                    <div class="bg-slate-900 rounded-2xl p-5 flex flex-col gap-4 border transition-all duration-300 group ${cardBorder}">
                        <div class="flex items-start justify-between gap-3">
                            <div class="flex items-center gap-3 min-w-0">
                                <div class="w-10 h-10 rounded-full ${isAlerted ? 'bg-rose-500/20 text-rose-500' : 'bg-slate-800 text-slate-400 group-hover:bg-blue-500/20 group-hover:text-blue-400'} flex items-center justify-center shrink-0 transition-colors duration-300">
                                    <i class="fa-solid ${isAlerted ? 'fa-crosshairs' : 'fa-user'}"></i>
                                </div>
                                <div class="min-w-0">
                                    <h3 class="font-bold text-slate-100 truncate w-full group-hover:text-blue-400 transition-colors duration-300" title="${name}">${name}</h3>
                                    <span class="text-xs font-mono bg-slate-950 px-2 py-0.5 rounded text-slate-400 border border-slate-800 group-hover:border-blue-500/30 transition-colors duration-300">ID: ${serverId}</span>
                                </div>
                            </div>
                        </div>

                        <div class="flex flex-col gap-2 mt-auto">
                            <!-- CFX ID -->
                            <div class="flex items-center justify-between bg-slate-950 p-2.5 rounded-xl border border-slate-800/50">
                                <span class="text-xs text-slate-500 font-medium flex items-center gap-2"><i class="fa-solid fa-user-astronaut text-orange-400"></i> CFX ID</span>
                                ${cfxId !== "N/A" 
                                    ? `<a href="https://forum.cfx.re/u/${cfxId}" target="_blank" class="font-mono text-xs text-orange-400 hover:text-orange-300 hover:underline truncate pl-2" title="Open CFX Profile">${cfxId}</a>` 
                                    : `<span class="font-mono text-xs text-slate-500 truncate pl-2">N/A</span>`
                                }
                            </div>
                            
                            <!-- Steam ID -->
                            <div class="flex items-center justify-between bg-slate-950 p-2.5 rounded-xl border border-slate-800/50">
                                <span class="text-xs text-slate-500 font-medium flex items-center gap-2"><i class="fa-brands fa-steam text-slate-400"></i> Steam</span>
                                <span class="font-mono text-xs text-slate-300 truncate pl-2" title="${steamId}">${steamId}</span>
                            </div>
                            
                            <!-- Discord ID -->
                            <div class="flex items-center justify-between bg-slate-950 p-2.5 rounded-xl border border-slate-800/50">
                                <span class="text-xs text-slate-500 font-medium flex items-center gap-2"><i class="fa-brands fa-discord text-indigo-400"></i> Discord</span>
                                ${discordId !== "N/A" 
                                    ? `<a href="https://discord.com/users/${discordId}" target="_blank" class="font-mono text-xs text-indigo-400 hover:text-indigo-300 hover:underline truncate pl-2" title="Open Discord Profile">${discordId}</a>` 
                                    : `<span class="font-mono text-xs text-slate-500 truncate pl-2">N/A</span>`
                                }
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Init
        renderAlertList();
        fetchServerData();
        setInterval(fetchServerData, 10000); // Auto-refresh every 10 seconds

    </script>
</body>
</html>
